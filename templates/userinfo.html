{% extends 'base.html' %}
{% block main %}
    <div class="container-fluid px-xl-5">
            <section class="py-5">
                <div class="card border-0 shadow-lg rounded-lg overflow-hidden">
                    <div class="card-header text-black py-3">
                        <h5 class="mb-0"><i class="fas fa-user-circle me-2"></i> 个人中心</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data">
                        <div class="row mb-4">
                            <div class="col-md-3 text-center">
                                <div class="avatar-upload mb-3">
                                    <div class="avatar-preview mb-3">
                                        <img id="avatarPreview" src="{{ avatar }}"
                                             class="rounded-circle shadow"
                                             style="width: 120px; height: 120px; object-fit: cover; border: 3px solid #e9ecef">
                                    </div>
                                    <div class="avatar-edit">
                                        <input type="file" id="avatarUpload" name="avatar" accept="image/*" class="d-none">
                                        <label for="avatarUpload" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-camera me-1"></i>更换头像
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-9">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="username" class="form-label">用户名</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                                            <input type="text" class="form-control" id="username" name="username"
                                                   value="{{ user_info.username }}" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">电子邮箱</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                            <input type="email" class="form-control" id="email" name="uemail"
                                                   value="{{ user_info.uemail }}" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="password" class="form-label">密码</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="password" name="password"
                                                   value="{{ user_info.password }}" required>
                                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="phone" class="form-label">电话</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                            <input type="text" class="form-control" id="phone" name="uphone"
                                                   value="{{ user_info.uphone }}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h5 class="mb-3"><i class="fas fa-map-marker-alt me-2"></i>地址信息</h5>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label for="address" class="form-label">详细地址</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-myApp"></i></span>
                                    <input type="text" class="form-control" id="address" name="uaddress"
                                           value="{{ user_info.uaddress }}">
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="zipcode" class="form-label">邮编</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-mail-bulk"></i></span>
                                    <input type="text" class="form-control" id="zipcode" name="uyoubian"
                                           value="{{ user_info.uyoubian }}">
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-success px-4 py-2">
                                <i class="fas fa-save me-2"></i>保存更改
                            </button>
                        </div>
                    </form>
                    </div>
                </div>
            </section>
        </div>
    <script>
        // 头像预览功能
        document.getElementById('avatarUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('avatarPreview').src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // 密码显示/隐藏切换
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
{% endblock %}
